<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трекер торговли</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #16213e;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid #0f3460;
        }

        h1 {
            text-align: center;
            color: #00d9ff;
            margin-bottom: 30px;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-section {
            background: #0f3460;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #1a1a2e;
        }

        .form-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 15px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 11px;
            color: #00d9ff;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, select {
            padding: 10px;
            border: 1px solid #1a1a2e;
            border-radius: 4px;
            font-size: 13px;
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            transition: border 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #00d9ff;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.3s;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            text-transform: uppercase;
        }

        .btn-add {
            background: #00d9ff;
            color: #1a1a2e;
            height: 42px;
        }

        .btn-add:hover {
            background: #00b8d4;
            transform: translateY(-1px);
        }

        .items-list {
            background: #0f3460;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #1a1a2e;
        }

        .item-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr auto;
            gap: 10px;
            padding: 12px;
            background: #1a1a2e;
            border-radius: 4px;
            margin-bottom: 8px;
            align-items: center;
            border-left: 3px solid #00d9ff;
        }

        .item-row .item-name {
            font-weight: bold;
            color: #e0e0e0;
        }

        .item-row .item-type {
            font-size: 11px;
            color: #888;
            background: #16213e;
            padding: 4px 8px;
            border-radius: 3px;
            text-align: center;
        }

        .item-row .item-qty {
            text-align: center;
            color: #e94560;
        }

        .item-row .item-price {
            text-align: right;
            color: #ffd700;
        }

        .item-row .item-total {
            text-align: right;
            font-weight: bold;
            color: #00ff88;
        }

        .btn-remove {
            background: #e94560;
            color: white;
            padding: 6px 12px;
            font-size: 11px;
        }

        .btn-remove:hover {
            background: #c73e54;
        }

        .total-section {
            background: #0f3460;
            color: #00ff88;
            padding: 20px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: bold;
            border: 1px solid #00ff88;
        }

        .btn-trade {
            width: 100%;
            padding: 15px;
            background: #00ff88;
            color: #1a1a2e;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-trade:hover {
            background: #00cc6a;
            transform: translateY(-2px);
        }

        /* Trading Mode Styles */
        .trading-mode {
            display: none;
        }

        .trading-mode.active {
            display: block;
        }

        .add-mode {
            display: block;
        }

        .add-mode.hidden {
            display: none;
        }

        .trade-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #0f3460;
            border-radius: 6px;
            border: 1px solid #1a1a2e;
        }

        .trade-title {
            font-size: 18px;
            color: #00d9ff;
            font-weight: bold;
            text-transform: uppercase;
        }

        .lock-btn {
            background: #ffd700;
            color: #1a1a2e;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .lock-btn:hover {
            background: #e6c200;
        }

        .trade-item {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr auto;
            gap: 10px;
            padding: 15px;
            background: #1a1a2e;
            border-radius: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid #0f3460;
        }

        .trade-item:hover {
            border-color: #00d9ff;
            transform: translateX(5px);
        }

        .trade-item.sold {
            background: #1a3a2e;
            border-color: #00ff88;
            opacity: 0.8;
        }

        .trade-item.partial {
            background: #2e2e1a;
            border-color: #ffd700;
        }

        .trade-item.not-sold {
            background: #3a1a1a;
            border-color: #e94560;
        }

        .trade-item.locked {
            pointer-events: none;
            opacity: 0.6;
        }

        .item-name {
            color: #e0e0e0;
            font-weight: bold;
        }

        .item-type {
            font-size: 11px;
            color: #888;
            text-align: center;
        }

        .item-qty {
            text-align: center;
            color: #e94560;
        }

        .item-remaining {
            text-align: center;
            color: #00d9ff;
            font-weight: bold;
        }

        .item-price {
            text-align: right;
            color: #ffd700;
        }

        .item-total {
            text-align: right;
            color: #00ff88;
            font-weight: bold;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
        }

        .status-sold {
            background: #00ff88;
            color: #1a1a2e;
        }

        .status-partial {
            background: #ffd700;
            color: #1a1a2e;
        }

        .status-not-sold {
            background: #e94560;
            color: white;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: #0f3460;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            border: 1px solid #1a1a2e;
        }

        .stat-label {
            font-size: 11px;
            color: #00d9ff;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 22px;
            font-weight: bold;
            color: #e0e0e0;
        }

        .stat-value.green {
            color: #00ff88;
        }

        .stat-value.red {
            color: #e94560;
        }

        .stat-value.gold {
            color: #ffd700;
        }

        .profit-section {
            background: #0f3460;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 2px solid #00ff88;
        }

        .profit-title {
            font-size: 14px;
            color: #00d9ff;
            margin-bottom: 10px;
            text-transform: uppercase;
            text-align: center;
        }

        .profit-value {
            font-size: 32px;
            color: #00ff88;
            text-align: center;
            font-weight: bold;
        }

        .back-btn {
            background: #0f3460;
            color: #00d9ff;
            margin-top: 20px;
            width: 100%;
            border: 1px solid #00d9ff;
        }

        .back-btn:hover {
            background: #1a1a2e;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #16213e;
            padding: 30px;
            border-radius: 8px;
            border: 2px solid #00d9ff;
            min-width: 400px;
        }

        .modal-title {
            font-size: 18px;
            color: #00d9ff;
            margin-bottom: 20px;
            text-transform: uppercase;
            text-align: center;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            margin-bottom: 15px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            color: #e0e0e0;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            border-radius: 4px;
        }

        .modal-input:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .modal-confirm {
            background: #00ff88;
            color: #1a1a2e;
        }

        .modal-cancel {
            background: #e94560;
            color: white;
        }

        .format-hint {
            font-size: 10px;
            color: #666;
            margin-top: 4px;
        }

        @media (max-width: 768px) {
            .form-row, .item-row, .trade-item {
                grid-template-columns: 1fr;
                gap: 8px;
            }
            
            .item-row > div, .trade-item > div {
                text-align: left !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Add Mode -->
        <div class="add-mode" id="addMode">
            <h1>[ Трекер торговли ]</h1>
            
            <div class="input-section">
                <div class="form-row">
                    <div class="form-group">
                        <label>Название предмета</label>
                        <input type="text" id="itemName" placeholder="Введите название">
                    </div>
                    <div class="form-group">
                        <label>Тип</label>
                        <select id="itemType">
                            <option value="ларец">Ларец</option>
                            <option value="скин">Скин</option>
                            <option value="аксессуар">Аксессуар</option>
                            <option value="прочее">Прочее</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Количество</label>
                        <input type="number" id="itemQty" placeholder="x1" min="1">
                    </div>
                    <div class="form-group">
                        <label>Цена за шт.</label>
                        <input type="text" id="itemPrice" placeholder="1.9к или 1500">
                        <div class="format-hint">Можно: 1.9к, 1.9кк, 12.7кк или число</div>
                    </div>
                    <button class="btn-add" onclick="addItem()">Добавить</button>
                </div>
            </div>

            <div class="items-list" id="itemsList">
                <div style="text-align: center; color: #666; padding: 40px;">
                    [ Список предметов пуст ]
                </div>
            </div>

            <div class="total-section" id="totalSection" style="display: none;">
                Итого: <span id="totalAmount">0</span>
            </div>

            <button class="btn-trade" id="tradeBtn" onclick="startTrading()" style="display: none;">
                >> Торговать <<
            </button>
        </div>

        <!-- Trading Mode -->
        <div class="trading-mode" id="tradingMode">
            <div class="trade-header">
                <div class="trade-title">[ Режим торговли ]</div>
                <button class="lock-btn" onclick="resetAllStatus()">
                    🔓 Сбросить все
                </button>
            </div>

            <div class="profit-section">
                <div class="profit-title">Общая прибыль с проданного</div>
                <div class="profit-value" id="totalProfit">0</div>
            </div>

            <div class="stats">
                <div class="stat-box">
                    <div class="stat-label">Всего</div>
                    <div class="stat-value" id="totalCount">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Продано</div>
                    <div class="stat-value green" id="soldCount">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Осталось</div>
                    <div class="stat-value red" id="remainingCount">0</div>
                </div>
            </div>

            <div id="tradeItemsList"></div>

            <button class="back-btn" onclick="backToAdd()"><< Вернуться к добавлению</button>
        </div>
    </div>

    <!-- Modal for entering sold quantity -->
    <div class="modal" id="soldModal">
        <div class="modal-content">
            <div class="modal-title">[ Введите количество проданного ]</div>
            <div style="margin-bottom: 15px; color: #888; font-size: 12px;">
                Предмет: <span id="modalItemName" style="color: #00d9ff;"></span><br>
                Доступно: <span id="modalAvailable" style="color: #00ff88;"></span>
            </div>
            <input type="number" class="modal-input" id="soldQuantity" min="1" placeholder="Сколько продали?">
            <div class="modal-buttons">
                <button class="modal-cancel" onclick="closeModal()">Отмена</button>
                <button class="modal-confirm" onclick="confirmSale()">Продать</button>
            </div>
        </div>
    </div>

    <script>
        let items = [];
        let isLocked = false;
        let currentItemId = null;
        let currentItemRemaining = 0;

        // Parse price input (1.9к, 1.9кк, 12.7кк, or regular number)
        function parsePrice(input) {
            if (!input || input.trim() === '') return 0;
            
            let str = input.trim().toLowerCase();
            
            // Check for кк (millions)
            if (str.includes('кк')) {
                let num = parseFloat(str.replace('кк', '').replace(',', '.'));
                return num * 1000000;
            }
            
            // Check for к (thousands)
            if (str.includes('к')) {
                let num = parseFloat(str.replace('к', '').replace(',', '.'));
                return num * 1000;
            }
            
            // Regular number
            let num = parseFloat(str.replace(',', '.'));
            return isNaN(num) ? 0 : num;
        }

        // Format number to Russian style (1.9к, 1.9кк, etc.)
        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1).replace(/\.0$/, '') + 'кк';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1).replace(/\.0$/, '') + 'к';
            } else {
                return num.toString();
            }
        }

        function addItem() {
            const name = document.getElementById('itemName').value.trim();
            const type = document.getElementById('itemType').value;
            const qty = parseInt(document.getElementById('itemQty').value) || 1;
            const priceInput = document.getElementById('itemPrice').value;
            const price = parsePrice(priceInput);

            if (!name) {
                alert('Введите название предмета!');
                return;
            }

            const item = {
                id: Date.now(),
                name: name,
                type: type,
                qty: qty,
                remaining: qty,
                price: price,
                total: qty * price,
                soldQty: 0,
                sold: false
            };

            items.push(item);
            renderItems();
            clearInputs();
        }

        function clearInputs() {
            document.getElementById('itemName').value = '';
            document.getElementById('itemQty').value = '';
            document.getElementById('itemPrice').value = '';
            document.getElementById('itemName').focus();
        }

        function removeItem(id) {
            items = items.filter(item => item.id !== id);
            renderItems();
        }

        function renderItems() {
            const list = document.getElementById('itemsList');
            const totalSection = document.getElementById('totalSection');
            const tradeBtn = document.getElementById('tradeBtn');

            if (items.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: #666; padding: 40px;">[ Список предметов пуст ]</div>';
                totalSection.style.display = 'none';
                tradeBtn.style.display = 'none';
                return;
            }

            let html = '';
            let total = 0;

            items.forEach(item => {
                total += item.total;
                html += `
                    <div class="item-row">
                        <div class="item-name">${item.name}</div>
                        <div class="item-type">${item.type}</div>
                        <div class="item-qty">x${item.qty}</div>
                        <div class="item-price">${formatNumber(item.price)}</div>
                        <div class="item-total">${formatNumber(item.total)}</div>
                        <button class="btn-remove" onclick="removeItem(${item.id})">✕</button>
                    </div>
                `;
            });

            list.innerHTML = html;
            document.getElementById('totalAmount').textContent = formatNumber(total);
            totalSection.style.display = 'block';
            tradeBtn.style.display = 'block';
        }

        function startTrading() {
            document.getElementById('addMode').classList.add('hidden');
            document.getElementById('tradingMode').classList.add('active');
            renderTradeItems();
            updateStats();
            updateProfit();
        }

        function openModal(itemId) {
            const item = items.find(i => i.id === itemId);
            if (!item || item.remaining <= 0) return;
            
            currentItemId = itemId;
            currentItemRemaining = item.remaining;
            
            document.getElementById('modalItemName').textContent = item.name;
            document.getElementById('modalAvailable').textContent = item.remaining;
            document.getElementById('soldQuantity').value = '';
            document.getElementById('soldQuantity').max = item.remaining;
            document.getElementById('soldModal').classList.add('active');
            document.getElementById('soldQuantity').focus();
        }

        function closeModal() {
            document.getElementById('soldModal').classList.remove('active');
            currentItemId = null;
            currentItemRemaining = 0;
        }

        function confirmSale() {
            const soldQty = parseInt(document.getElementById('soldQuantity').value);
            
            if (!soldQty || soldQty < 1) {
                alert('Введите корректное количество!');
                return;
            }
            
            const item = items.find(i => i.id === currentItemId);
            if (!item) {
                closeModal();
                return;
            }
            
            if (soldQty > item.remaining) {
                alert('Нельзя продать больше, чем есть в наличии!');
                return;
            }
            
            item.remaining -= soldQty;
            item.soldQty += soldQty;
            
            if (item.remaining === 0) {
                item.sold = true;
            }
            
            closeModal();
            renderTradeItems();
            updateStats();
            updateProfit();
        }

        function renderTradeItems() {
            const list = document.getElementById('tradeItemsList');
            let html = '';

            items.forEach(item => {
                let statusClass, statusText, statusBadge;
                
                if (item.sold) {
                    statusClass = 'sold';
                    statusText = 'Продано';
                    statusBadge = 'status-sold';
                } else if (item.soldQty > 0) {
                    statusClass = 'partial';
                    statusText = `Продано: ${item.soldQty}/${item.qty}`;
                    statusBadge = 'status-partial';
                } else {
                    statusClass = 'not-sold';
                    statusText = 'Не продано';
                    statusBadge = 'status-not-sold';
                }
                
                const soldValue = item.soldQty * item.price;
                
                html += `
                    <div class="trade-item ${statusClass} ${isLocked ? 'locked' : ''}" 
                         onclick="openModal(${item.id})" 
                         id="item-${item.id}">
                        <div class="item-name">${item.name}</div>
                        <div class="item-type">${item.type}</div>
                        <div class="item-qty">x${item.qty}</div>
                        <div class="item-remaining">Ост: ${item.remaining}</div>
                        <div class="item-price">${formatNumber(item.price)}</div>
                        <div class="item-total">${formatNumber(soldValue)}</div>
                        <span class="status-badge ${statusBadge}">${statusText}</span>
                    </div>
                `;
            });

            list.innerHTML = html;
        }

        function updateStats() {
            const total = items.length;
            const sold = items.filter(i => i.sold).length;
            const remaining = items.filter(i => i.remaining > 0).length;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('soldCount').textContent = sold;
            document.getElementById('remainingCount').textContent = remaining;
        }

        function updateProfit() {
            let totalProfit = 0;
            items.forEach(item => {
                totalProfit += item.soldQty * item.price;
            });
            document.getElementById('totalProfit').textContent = formatNumber(totalProfit);
        }

        function resetAllStatus() {
            if (confirm('Сбросить статусы всех предметов?')) {
                items.forEach(item => {
                    item.sold = false;
                    item.soldQty = 0;
                    item.remaining = item.qty;
                });
                renderTradeItems();
                updateStats();
                updateProfit();
            }
        }

        function backToAdd() {
            document.getElementById('tradingMode').classList.remove('active');
            document.getElementById('addMode').classList.remove('hidden');
            isLocked = false;
        }

        // Enter key support for modal
        document.getElementById('soldQuantity').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') confirmSale();
        });

        // Enter key support for price input
        document.getElementById('itemPrice').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addItem();
        });

        // Close modal on outside click
        document.getElementById('soldModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
